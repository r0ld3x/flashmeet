<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlashMeet - Random Video Chat</title>
    <meta name="description" content="Meet strangers instantly with random video chat. No sign-up, no downloads — just click Start and talk." />
    <meta name="keywords" content="video chat, random chat, omegle alternative, stranger chat, webcam chat, flashmeet, live video" />
    <meta name="author" content="FlashMeet" />
    <meta name="theme-color" content="#111111" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://flashmeet.tech/" />
    <meta property="og:title" content="FlashMeet - Random Video Chat" />
    <meta property="og:description" content="Meet strangers instantly with random video chat. No sign-up, no downloads — just click Start and talk." />
    <meta property="og:image" content="https://flashmeet.tech/logo.png" />
    <meta property="og:site_name" content="FlashMeet" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FlashMeet - Random Video Chat" />
    <meta name="twitter:description" content="Meet strangers instantly with random video chat. No sign-up, no downloads — just click Start and talk." />
    <meta name="twitter:image" content="https://flashmeet.tech/logo.png" />

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚡</text></svg>" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #1a1a1a;
        color: #e0e0e0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .topbar {
        background: #111;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #333;
        flex-shrink: 0;
      }

      .topbar .logo {
        display: flex;
        align-items: center;
        gap: 6px;
        text-decoration: none;
      }

      .topbar .logo .wordmark {
        font-size: 1.4em;
        font-weight: 800;
        letter-spacing: -0.5px;
      }

      .topbar .logo .word-flash {
        color: #fff;
      }

      .topbar .logo .word-meet {
        color: #888;
      }

      .topbar .logo .bolt {
        color: #2196f3;
        font-size: 0.9em;
        margin-left: -2px;
      }

      .topbar .tagline {
        font-size: 0.75em;
        color: #555;
        display: none;
      }

      @media (min-width: 600px) {
        .topbar .tagline {
          display: inline;
        }
      }

      .topbar .status-text {
        font-size: 0.85em;
        color: #888;
      }

      .topbar .status-text.active {
        color: #4caf50;
      }

      .topbar .status-text.searching {
        color: #ff9800;
      }

      .main {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      .video-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #000;
        min-width: 0;
      }

      .videos {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      .vid-box {
        flex: 1;
        position: relative;
        background: #0a0a0a;
        overflow: hidden;
      }

      .vid-box + .vid-box {
        border-left: 1px solid #333;
      }

      .vid-box video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      #localVideo {
        transform: scaleX(-1);
      }

      .vid-label {
        position: absolute;
        bottom: 8px;
        left: 8px;
        background: rgba(0, 0, 0, 0.6);
        color: #ccc;
        padding: 3px 10px;
        border-radius: 4px;
        font-size: 0.8em;
      }

      .btn-bar {
        display: flex;
        justify-content: center;
        gap: 10px;
        padding: 12px;
        background: #111;
        border-top: 1px solid #333;
        flex-shrink: 0;
      }

      .btn-bar button {
        padding: 10px 28px;
        border: none;
        border-radius: 4px;
        font-size: 0.95em;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      .btn-bar button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .btn-bar button:hover:not(:disabled) {
        opacity: 0.85;
      }

      .btn-start {
        background: #4caf50;
        color: #fff;
      }

      .btn-next {
        background: #2196f3;
        color: #fff;
      }

      .btn-stop {
        background: #f44336;
        color: #fff;
      }

      .chat-panel {
        width: 320px;
        display: flex;
        flex-direction: column;
        background: #111;
        border-left: 1px solid #333;
        flex-shrink: 0;
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        min-height: 0;
      }

      .chat-messages::-webkit-scrollbar {
        width: 6px;
      }

      .chat-messages::-webkit-scrollbar-thumb {
        background: #444;
        border-radius: 3px;
      }

      .msg {
        margin-bottom: 8px;
        padding: 7px 10px;
        border-radius: 6px;
        max-width: 90%;
        word-wrap: break-word;
        font-size: 0.9em;
        line-height: 1.4;
      }

      .msg.sent {
        background: #2a5298;
        color: #fff;
        margin-left: auto;
      }

      .msg.received {
        background: #2a2a2a;
        color: #ddd;
      }

      .msg.system {
        background: none;
        color: #666;
        text-align: center;
        font-size: 0.8em;
        max-width: 100%;
      }

      .chat-input {
        display: flex;
        padding: 10px;
        gap: 8px;
        border-top: 1px solid #333;
      }

      .chat-input input {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid #333;
        border-radius: 4px;
        background: #1a1a1a;
        color: #e0e0e0;
        font-size: 0.9em;
        outline: none;
      }

      .chat-input input:focus {
        border-color: #555;
      }

      .chat-input button {
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        background: #2196f3;
        color: #fff;
        font-size: 0.9em;
        cursor: pointer;
      }

      .chat-input button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      @media (max-width: 768px) {
        .main {
          flex-direction: column;
        }

        .videos {
          flex-direction: column;
        }

        .vid-box + .vid-box {
          border-left: none;
          border-top: 1px solid #333;
        }

        .chat-panel {
          width: 100%;
          border-left: none;
          border-top: 1px solid #333;
          max-height: 40vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:14px;">
        <a class="logo" href="/">
          <span class="wordmark"><span class="word-flash">flash</span><span class="word-meet">meet</span></span>
          <span class="bolt">&#9889;</span>
        </a>
        <span class="tagline">Talk to strangers</span>
      </div>
      <span class="status-text" id="statusText">Click Start to begin</span>
    </div>

    <div class="main">
      <div class="video-area">
        <div class="videos">
          <div class="vid-box">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="vid-label">You</div>
          </div>
          <div class="vid-box">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="vid-label">Stranger</div>
          </div>
        </div>

        <div class="btn-bar">
          <button class="btn-start" id="startBtn" onclick="start()">
            Start
          </button>
          <button class="btn-next" id="nextBtn" onclick="next()" disabled>
            Next
          </button>
          <button class="btn-stop" id="stopBtn" onclick="stop()" disabled>
            Stop
          </button>
        </div>
      </div>

      <div class="chat-panel">
        <div class="chat-messages" id="chatMessages">
          <div class="msg system">Find someone to start chatting</div>
        </div>
        <div class="chat-input">
          <input
            type="text"
            id="msgInput"
            placeholder="Type a message..."
            disabled
            onkeydown="if(event.key==='Enter')sendChat()"
          />
          <button id="sendBtn" onclick="sendChat()" disabled>Send</button>
        </div>
      </div>
    </div>

    <script>
      const url = new URL(window.location.href);
      let ws = null;
      let localStream = null;
      let peerConnection = null;
      let isCaller = false;
      let sessionToken = null;

      const config = {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" },
          {
            urls: "turn:openrelay.metered.ca:80",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
          {
            urls: "turn:openrelay.metered.ca:443",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
          {
            urls: "turn:openrelay.metered.ca:443?transport=tcp",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
        ],
        iceCandidatePoolSize: 10,
      };

      function setStatus(text, cls) {
        const el = document.getElementById("statusText");
        el.textContent = text;
        el.className = "status-text" + (cls ? " " + cls : "");
      }

      async function start() {
        document.getElementById("startBtn").disabled = true;

        try {
          setStatus("Starting camera...");
          localStream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true,
          });
          document.getElementById("localVideo").srcObject = localStream;
        } catch (e) {
          console.error("Camera error:", e);
          setStatus("Camera access denied");
          document.getElementById("startBtn").disabled = false;
          return;
        }

        try {
          setStatus("Connecting...");
          const api = await fetch(`${url.origin}/session/new`);
          const response = await api.json();
          sessionToken = response.token;

          ws = new WebSocket(`ws://${url.host}/ws?token=${sessionToken}`);

          ws.onopen = () => {
            setStatus("Looking for someone...", "searching");
            document.getElementById("stopBtn").disabled = false;
            ws.send(JSON.stringify({ op: "join_queue" }));
          };

          ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            handleMessage(msg);
          };

          ws.onclose = () => {
            setStatus("Disconnected");
            resetUI(false);
          };

          ws.onerror = () => {
            setStatus("Connection error");
          };
        } catch (e) {
          console.error("Connect error:", e);
          setStatus("Failed to connect");
          document.getElementById("startBtn").disabled = false;
        }
      }

      function next() {
        if (peerConnection) {
          peerConnection.close();
          peerConnection = null;
        }
        document.getElementById("remoteVideo").srcObject = null;
        isCaller = false;

        sendMessage({ op: "next" });

        document.getElementById("nextBtn").disabled = true;
        document.getElementById("msgInput").disabled = true;
        document.getElementById("sendBtn").disabled = true;
        clearChat();
        addSystemMsg("Looking for someone new...");
        setStatus("Looking for someone...", "searching");
      }

      function stop() {
        if (localStream) {
          localStream.getTracks().forEach((t) => t.stop());
          localStream = null;
        }
        if (peerConnection) {
          peerConnection.close();
          peerConnection = null;
        }
        if (ws) {
          ws.close();
          ws = null;
        }
        resetUI(true);
      }

      function resetUI(full) {
        document.getElementById("startBtn").disabled = false;
        document.getElementById("nextBtn").disabled = true;
        document.getElementById("stopBtn").disabled = true;
        document.getElementById("msgInput").disabled = true;
        document.getElementById("sendBtn").disabled = true;
        isCaller = false;

        if (full) {
          document.getElementById("localVideo").srcObject = null;
          document.getElementById("remoteVideo").srcObject = null;
          setStatus("Click Start to begin");
          clearChat();
        }
      }

      function handleMessage(msg) {
        switch (msg.op) {
          case "match_found":
            handleMatchFound(msg);
            break;
          case "webrtc_offer":
            handleOffer(msg);
            break;
          case "webrtc_answer":
            handleAnswer(msg);
            break;
          case "ice_candidate":
            handleIceCandidate(msg);
            break;
          case "chat":
            addMsg(msg.message, "received");
            break;
          case "partner_disconnected":
            handlePartnerDisconnected();
            break;
        }
      }

      async function handleMatchFound(msg) {
        isCaller = msg.role === "caller";
        setStatus("Connected to stranger", "active");
        clearChat();
        addSystemMsg("You're now chatting with a stranger.");

        document.getElementById("nextBtn").disabled = false;
        document.getElementById("msgInput").disabled = false;
        document.getElementById("sendBtn").disabled = false;

        await createPeerConnection();

        if (isCaller) {
          console.log("=== I am the CALLER ===");
          const offer = await peerConnection.createOffer();
          await peerConnection.setLocalDescription(offer);
          sendMessage({
            op: "webrtc_offer",
            data: { sdp: offer.sdp },
          });
        } else {
          console.log("=== I am the CALLEE - waiting for offer ===");
        }
      }

      async function createPeerConnection() {
        peerConnection = new RTCPeerConnection(config);

        if (localStream) {
          localStream.getTracks().forEach((track) => {
            peerConnection.addTrack(track, localStream);
          });
        }

        peerConnection.onicecandidate = (event) => {
          if (event.candidate) {
            sendMessage({
              op: "ice_candidate",
              data: { candidate: event.candidate },
            });
          }
        };

        peerConnection.ontrack = (event) => {
          const remoteVideo = document.getElementById("remoteVideo");
          if (remoteVideo.srcObject !== event.streams[0]) {
            remoteVideo.srcObject = event.streams[0];
          }
        };

        peerConnection.oniceconnectionstatechange = () => {
          console.log(
            "ICE Connection State:",
            peerConnection.iceConnectionState
          );
        };
      }

      async function handleOffer(msg) {
        console.log("=== Received WebRTC offer ===");

        if (isCaller) {
          console.error("I am the CALLER - should not receive offer!");
          return;
        }
        if (!peerConnection) {
          await createPeerConnection();
        }

        await peerConnection.setRemoteDescription(
          new RTCSessionDescription({ type: "offer", sdp: msg.data })
        );

        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);

        sendMessage({
          op: "webrtc_answer",
          data: { sdp: answer.sdp },
        });
        console.log("Answer sent to CALLER");
      }

      async function handleAnswer(msg) {
        console.log("=== Received WebRTC answer ===");

        if (!isCaller) {
          console.error("I am the CALLEE - should not receive answer!");
          return;
        }
        if (!peerConnection) {
          console.error("No peer connection exists!");
          return;
        }

        if (peerConnection.signalingState !== "have-local-offer") {
          console.error(
            "Cannot set remote answer in state:",
            peerConnection.signalingState
          );
          return;
        }

        await peerConnection.setRemoteDescription(
          new RTCSessionDescription({ type: "answer", sdp: msg.data.sdp })
        );
        console.log("Remote answer set successfully");
      }

      async function handleIceCandidate(msg) {
        if (peerConnection && msg.data.candidate) {
          const candidate = msg.data.candidate;
          await peerConnection.addIceCandidate(
            new RTCIceCandidate({
              candidate: candidate.candidate,
              sdpMLineIndex: candidate.sdpMLineIndex,
              sdpMid: candidate.sdpMid,
            })
          );
        }
      }

      function handlePartnerDisconnected() {
        console.log("Partner disconnected");

        if (peerConnection) {
          peerConnection.close();
          peerConnection = null;
        }

        document.getElementById("remoteVideo").srcObject = null;
        isCaller = false;

        document.getElementById("msgInput").disabled = true;
        document.getElementById("sendBtn").disabled = true;
        document.getElementById("nextBtn").disabled = true;

        addSystemMsg("Stranger has disconnected.");
        setStatus("Looking for someone...", "searching");

        setTimeout(() => {
          if (ws && ws.readyState === WebSocket.OPEN && localStream) {
            ws.send(JSON.stringify({ op: "join_queue" }));
          }
        }, 1000);
      }

      function sendMessage(message) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(message));
        }
      }

      function sendChat() {
        const input = document.getElementById("msgInput");
        const text = input.value.trim();
        if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

        sendMessage({ op: "chat", data: { message: text } });
        addMsg(text, "sent");
        input.value = "";
      }

      function addMsg(text, type) {
        const box = document.getElementById("chatMessages");
        const d = document.createElement("div");
        d.className = "msg " + type;
        d.textContent = text;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
      }

      function addSystemMsg(text) {
        const box = document.getElementById("chatMessages");
        const d = document.createElement("div");
        d.className = "msg system";
        d.textContent = text;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
      }

      function clearChat() {
        document.getElementById("chatMessages").innerHTML = "";
      }
    </script>
  </body>
</html>
